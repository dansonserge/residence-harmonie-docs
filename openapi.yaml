openapi: 3.0.3
info:
  title: Residence Management System API
  version: 1.0.0
  description: API for managing a multi-tenant SaaS Residence System.

servers:
  - url: http://localhost:4010
    description: Prism Mock Server
  - url: http://localhost:3001
    description: JSON Server Backend

components:
  parameters:
    ResidenceIdParam:
      name: residenceId
      in: path
      required: true
      schema:
        type: string
      description: The ID of the residence (tenant).
    PeriodQuery:
      name: period
      in: query
      required: false
      schema:
        type: string
        enum: [Morning, Mid-morning, Lunch, Afternoon, Dinner, Evening, All]
    ShiftQuery:
      name: shift
      in: query
      required: false
      schema:
        type: string

  schemas:
    # --- Super Admin Schemas ---
    Tenant:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        active: { type: boolean }
    Subscription:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        plan: { type: string }
        status: { type: string }
    BillingInfo:
      type: object
      properties:
        tenantId: { type: string }
        amountDue: { type: number }
        nextBillingDate: { type: string, format: date-time }
    GlobalMetrics:
      type: object
      properties:
        totalTenants: { type: integer }
        activeUsers: { type: integer }

    # --- Admin Schemas ---
    AdminDashboard:
      type: object
      properties:
        generalSettings:
          $ref: '#/components/schemas/ResidenceSettings'
        periodsCount: { type: integer }
        shiftsCount: { type: integer }
        prioritiesCount: { type: integer }
        frequenciesCount: { type: integer }
        catalogItems:
          type: array
          items:
            $ref: '#/components/schemas/TaskCatalogItemSummary'
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
    ResidenceSettings:
      type: object
      properties:
        residenceName: { type: string }
        address: { type: string }
        language: { type: string }
        logoUrl: { type: string }
    SystemLog:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        message: { type: string }
        level: { type: string }

    Room:
      type: object
      properties:
        id: { type: string }
        number: { type: string }
        capacity: { type: integer }
    Period:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        startTime: { type: string }
        endTime: { type: string }
    Shift:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    Priority:
      type: object
      properties:
        id: { type: string }
        level: { type: string }
        color: { type: string }
    Frequency:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    Risk:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    FoodTexture:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    Allergy:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    TaskCatalogItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        defaultDuration: { type: integer }
        priority: { type: string }
    TaskCatalogItemSummary:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        duration: { type: string }
        priority: { type: string }
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string, enum: [Admin, Manager, Employee] }
        status: { type: string, enum: [Active, Inactive] }
    UserSummary:
      type: object
      properties:
        name: { type: string }
        role: { type: string }
        status: { type: string }

    # --- Employee Schemas ---
    ResidentAlerts:
      type: object
      properties:
        texture: { type: string }
        allergies:
          type: array
          items: { type: string }
        mobility: { type: string }
        risk: { type: string }
    Resident:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        roomNumber: { type: string }
        photoUrl: { type: string }
        doneTasksCount: { type: integer }
        totalTasksCount: { type: integer }
        alerts:
          $ref: '#/components/schemas/ResidentAlerts'
    Task:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        duration: { type: string }
        priority: { type: string }
        status: { type: string, enum: [Done, In Progress, Refused, Not Applicable, Pending] }
        period: { type: string }
        observation: { type: string }
    TaskStatusUpdate:
      type: object
      properties:
        status: { type: string, enum: [Done, In Progress, Refused, Not Applicable] }
        observation: { type: string }
    TaskSummaryCount:
      type: object
      properties:
        done: { type: integer }
        pending: { type: integer }
        refused: { type: integer }

    # --- Manager Schemas ---
    ManagerDashboard:
      type: object
      properties:
        kpis:
          $ref: '#/components/schemas/DashboardKPIs'
        charts:
          type: object
          properties:
            tasksByPeriod:
              type: array
              items:
                type: object
                properties:
                  period: { type: string }
                  rate: { type: number }
            completionByEmployee:
              type: object
              properties:
                completed: { type: integer }
                pending: { type: integer }
                refused: { type: integer }
                rate: { type: number }
            tasksByResident:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  completed: { type: integer }
                  total: { type: integer }
        tables:
          type: object
          properties:
            pendingTasks:
              type: array
              items:
                $ref: '#/components/schemas/PendingTaskItem'
            recentObservations:
              type: array
              items:
                $ref: '#/components/schemas/ObservationItem'
        quickReports:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              subtitle: { type: string }
    DashboardKPIs:
      type: object
      properties:
        activeResidents: { type: integer }
        tasksCompleted: { type: integer }
        completionRate: { type: number }
        pendingTasks: { type: integer }
        refusedTasks: { type: integer }
        observationsToday: { type: integer }
    PendingTaskItem:
      type: object
      properties:
        resident: { type: string }
        task: { type: string }
        period: { type: string }
        dueTime: { type: string }
    ObservationItem:
      type: object
      properties:
        resident: { type: string }
        text: { type: string }
        time: { type: string }
        status: { type: string }
    ReportOutput:
      type: object
      properties:
        reportUrl: { type: string }
        generatedAt: { type: string, format: date-time }

paths:
  # ==========================================
  # 1. SUPER ADMIN ENDPOINTS (Root Level)
  # ==========================================
  /tenants:
    get:
      tags: [Super Admin]
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tenant'
    post:
      tags: [Super Admin]
      responses: { '201': { description: 'Created' } }
  /subscriptions:
    get:
      tags: [Super Admin]
      responses: { '200': { description: 'OK', content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Subscription' } } } } } }
  /billing:
    get:
      tags: [Super Admin]
      responses:
        '200':
          description: Global billing info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingInfo'
  /metrics/global:
    get:
      tags: [Super Admin]
      responses:
        '200':
          description: Global metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalMetrics'

  # ==========================================
  # 2. ADMIN ENDPOINTS (Residence Level)
  # ==========================================
  /residences/{residenceId}/admin/dashboard:
    get:
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/ResidenceIdParam'
      responses:
        '200':
          description: Admin dashboard overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboard'
  /residences/{residenceId}/settings:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK', content: { application/json: { schema: { $ref: '#/components/schemas/ResidenceSettings' } } } } }
    put:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'Updated' } }
  /residences/{residenceId}/logs:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK', content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/SystemLog' } } } } } }

  # Catalogs
  /residences/{residenceId}/rooms:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/periods:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/shifts:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/priorities:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/frequencies:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/risks:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/textures:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/allergies:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/task-catalog:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/users:
    get:
      tags: [Admin]
      parameters: [ { $ref: '#/components/parameters/ResidenceIdParam' } ]
      responses: { '200': { description: 'OK' } }

  # ==========================================
  # 3. EMPLOYEE ENDPOINTS
  # ==========================================
  /residences/{residenceId}/residents:
    get:
      tags: [Employee]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses:
        '200':
          description: List of residents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resident'
  /residences/{residenceId}/residents/{residentId}/tasks:
    get:
      tags: [Employee]
      parameters:
        - $ref: '#/components/parameters/ResidenceIdParam'
        - name: residentId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
  /residences/{residenceId}/residents/{residentId}/tasks/summary:
    get:
      tags: [Employee]
      parameters:
        - $ref: '#/components/parameters/ResidenceIdParam'
        - name: residentId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSummaryCount'
  /residences/{residenceId}/residents/{residentId}/tasks/{taskId}:
    patch:
      tags: [Employee]
      parameters:
        - $ref: '#/components/parameters/ResidenceIdParam'
        - name: residentId
          in: path
          required: true
          schema: { type: string }
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses: { '200': { description: 'Updated' } }
  /residences/{residenceId}/residents/{residentId}/tasks/batch:
    put:
      tags: [Employee]
      parameters:
        - $ref: '#/components/parameters/ResidenceIdParam'
        - name: residentId
          in: path
          required: true
          schema: { type: string }
      responses: { '200': { description: 'Saved All' } }
  /residences/{residenceId}/context/current:
    get:
      tags: [Employee]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses: { '200': { description: 'OK' } }

  # ==========================================
  # 4. MANAGER ENDPOINTS
  # ==========================================
  /residences/{residenceId}/manager/dashboard:
    get:
      tags: [Manager]
      parameters:
        - $ref: '#/components/parameters/ResidenceIdParam'
        - $ref: '#/components/parameters/PeriodQuery'
        - $ref: '#/components/parameters/ShiftQuery'
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerDashboard'
  /residences/{residenceId}/manager/tasks:
    get:
      tags: [Manager]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/manager/observations:
    get:
      tags: [Manager]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/reports/daily:
    get:
      tags: [Manager]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/reports/employee:
    get:
      tags: [Manager]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses: { '200': { description: 'OK' } }
  /residences/{residenceId}/reports/export/pdf:
    get:
      tags: [Manager]
      parameters: [{ $ref: '#/components/parameters/ResidenceIdParam' }]
      responses: { '200': { description: 'OK' } }
